name: CI

on:
  push:
    paths-ignore:
      - "*.md"
      - "**/*.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "*.md"
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        run: PYTHONPATH=src uv run pytest tests/ -v
