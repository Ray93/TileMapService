# ============================================
# TileMapService 配置文件
# ============================================
#
# 使用说明：
# 1. 复制此文件为 config.yaml 并根据需要修改
# 2. 支持 ArcGIS Compact Cache V1 和 V2 格式
# 3. 访问瓦片 API：
#    - XYZ:    http://localhost:8000/tiles/{source}/{z}/{x}/{y}
#    - TMS:    http://localhost:8000/tms/{source}/{z}/{x}/{y}
#    - WMTS:   http://localhost:8000/wmts/1.0.0/WMTSCapabilities.xml
#    - 预览:   http://localhost:8000/preview/{source}
#    - 元数据: http://localhost:8000/api/sources
# 4. 环境变量覆盖（优先级高于配置文件）：
#    export TILEMAPSERVICE_SERVER_PORT=9000
#    export TILEMAPSERVICE_CACHE_MAX_SIZE=5000
#    export TILEMAPSERVICE_CONFIG=/path/to/config.yaml
#
# 支持的瓦片目录结构：
#
# 结构 1: 标准 _alllayers 结构（最常见）
# /path/to/tiles/
# ├── Conf.xml          # 可选：瓦片元数据（空间参考、原点、LOD、瓦片格式等）
# ├── conf.cdi          # 可选：数据实际范围边界
# └── _alllayers/       # 所有图层合并的瓦片目录
#     ├── L00/          # 级别 0（最低分辨率）
#     │   ├── R0000C0000.bundle     # 瓦片数据文件
#     │   └── R0000C0000.bundlx     # V1 格式索引文件（V2 格式不需要）
#     ├── L01/          # 级别 1
#     │   ├── R0000C0000.bundle
#     │   ├── R0000C0000.bundlx
#     │   ├── R0000C0080.bundle
#     │   └── R0000C0080.bundlx
#     ├── L02/          # 级别 2
#     └── ...           # 更多级别
#
# 结构 2: 直接级别目录结构（不带 _alllayers）
# /path/to/tiles/
# ├── Conf.xml          # 可选
# ├── conf.cdi          # 可选
# ├── L00/              # 级别 0 - 直接在根目录
# │   ├── R0000C0000.bundle
# │   └── R0000C0000.bundlx
# ├── L01/              # 级别 1
# │   ├── R0000C0000.bundle
# │   └── R0000C0000.bundlx
# ├── L02/              # 级别 2
# └── ...               # 更多级别
#
# 注意：如果数据有多个图层目录（如 layer1/, layer2/ 等），请在 path 中明确指定到具体图层：
#   path: "/data/tiles/layer1"  # 指向具体图层
#
# 文件说明：
# - Conf.xml:          包含空间参考（WKID）、瓦片原点、LOD 定义、瓦片大小、图像格式等
# - conf.cdi:          包含数据的实际边界范围（最小/最大行列号）
# - .bundle:           瓦片数据文件（128x128 瓦片块）
# - .bundlx:           V1 格式的索引文件（V2 格式索引内嵌在 .bundle 中，不需要此文件）
#
# 图层查找优先级：
# - 如果存在 _alllayers 目录，优先使用
# - 否则使用 path 下直接的 L{z:02d} 目录（如 L00/, L01/...）
#
# 如果缺少可选文件，将使用以下默认值：
# - 空间参考：WKID 3857 (Web Mercator)
# - 瓦片原点：(-20037508.342787, 20037508.342787)
# - 瓦片大小：256x256 像素
# - 数据范围：全球范围
# - LOD 定义：自动从目录结构推断（L00, L01, L02...）
#
# 支持格式：
# - V1 格式：.bundle + .bundlx（两个文件）
# - V2 格式：单个 .bundle 文件（索引内嵌）
# - 混合：同一数据源可包含 V1 和 V2 格式的不同级别
#
# ============================================

# ============================================
# 服务器配置
# ============================================
server:
  # 监听地址
  # - 0.0.0.0: 允许外部访问
  # - 127.0.0.1: 仅本地访问
  host: 0.0.0.0

  # 监听端口
  port: 8000

  # 调试模式
  # 开启后会输出详细日志，不建议在生产环境使用
  debug: false

  # 优雅关闭超时（秒）
  # 收到停止信号后，等待正在处理的请求完成的最长时间
  graceful_shutdown_timeout: 5

# ============================================
# 缓存配置
# ============================================
cache:
  # 是否启用瓦片缓存
  # 启用后可显著提升重复请求的响应速度
  enabled: true

  # 最大缓存瓦片数量
  # 每个瓦片约占用 20-100KB 内存，根据实际情况调整
  # 推荐值：1000-10000
  max_size: 1000

  # 缓存过期时间（秒）
  # 瓦片在缓存中的最长保留时间
  # 3600 = 1小时, 86400 = 24小时
  ttl: 3600

  # 缓存分片数量
  # 使用多个独立的缓存分片减少并发访问时的锁竞争
  # 推荐值：16（适合大多数场景）
  num_shards: 16

# ============================================
# Bundle 文件池配置
# ============================================
bundle_pool:
  # 是否启用文件句柄池
  # 启用后复用文件句柄，减少频繁打开/关闭文件的开销
  enabled: true

  # 文件池最大大小
  # 同时保持打开的 .bundle 文件数量上限
  # 推荐值：50-100（根据数据源数量和系统资源调整）
  max_size: 50

# ============================================
# CORS（跨域资源共享）配置
# ============================================
cors:
  # 是否启用 CORS
  # 如果前端和瓦片服务不在同一域名，需要启用
  enabled: true

  # 允许的源地址列表
  # "*" 表示允许所有来源（开发环境）
  # 生产环境建议指定具体域名，例如：
  # - "https://map.example.com"
  # - "https://app.example.com"
  allow_origins:
    - "*"

  # 允许的 HTTP 方法
  allow_methods:
    - GET

  # 允许的请求头
  allow_headers:
    - "*"

# ============================================
# 默认参数配置
# ============================================
defaults:
  # 默认空间参考系
  spatial_ref:
    # WKID（Well-Known ID）
    # 3857 = Web Mercator (常用于在线地图)
    # 4326 = WGS84 地理坐标系
    # 2000-4000+ = 各国/地区的投影坐标系
    wkid: 3857

  # 瓦片原点坐标
  # Web Mercator (EPSG:3857) 的标准原点（左上角）
  tile_origin:
    x: -20037508.342787
    y: 20037508.342787

  # 瓦片尺寸（像素）
  # 标准值：256 或 512
  tile_size: 256

  # 是否自动推断数据边界
  # 启用后从 conf.cdi 文件读取实际数据范围
  # 禁用则使用全球范围
  infer_bounds: true

# ============================================
# 数据源配置
# ============================================
sources:
  # 示例 1: 最简配置（使用默认值）
  - name: "my-tiles"
    path: "./data/tiles"
    description: "我的瓦片数据"

  # 示例 2: 完整配置（覆盖所有默认值）
  # - name: "custom-tiles"
  #   path: "/data/custom-tiles"
  #   description: "自定义配置的瓦片数据"
  #   spatial_ref:
  #     wkid: 4326                    # 覆盖默认空间参考（WGS84 地理坐标系）
  #   tile_origin:
  #     x: -180.0                     # 覆盖默认瓦片原点
  #     y: 90.0
  #   bounds:                         # 手动指定数据边界（不使用 conf.cdi）
  #     - -180.0                      # minX
  #     - -90.0                       # minY
  #     - 180.0                       # maxX
  #     - 90.0                        # maxY

  # 示例 3: 多个数据源
  # - name: "china-base"
  #   path: "/data/china-base-map"
  #   description: "中国基础底图"
  #
  # - name: "world-imagery"
  #   path: "/data/world-imagery"
  #   description: "全球影像数据"
  #
  # - name: "terrain"
  #   path: "/data/terrain-layer1"   # 多图层数据需指定到具体图层
  #   description: "地形数据（图层1）"


